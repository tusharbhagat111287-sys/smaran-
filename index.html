<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:#1a1a1a;color:#fff;margin:0;padding-bottom:20px;text-align:center;user-select:none;touch-action:manipulation}
.c{padding:10px;max-width:600px;margin:auto}

/* Top Navigation Tabs */
.nav-tabs{background:#111;padding:12px;display:flex;justify-content:center;gap:15px;position:sticky;top:0;z-index:100;border-bottom:1px solid #333}
.nt-btn{padding:8px 25px;border-radius:5px;font-weight:bold;font-size:14px;background:#333;color:#888;border:none;cursor:pointer}
.nt-btn.act{background:#2196f3;color:#fff;box-shadow:0 0 10px rgba(33,150,243,0.5)}

/* Cards */
.card{background:#333;border-radius:15px;padding:15px;margin-bottom:15px;box-shadow:0 4px 6px rgba(0,0,0,0.3)}

/* Status Card */
.stat-hdr{color:#2196f3;font-weight:900;font-size:13px;margin-bottom:10px}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.time-text{font-size:22px;color:#fbc02d;font-weight:bold}
.badge{font-size:10px;padding:3px 8px;border-radius:5px;font-weight:bold;background:#4caf50;color:#fff}
.badge.offline{background:#f44336}
.status-msg{color:#69f0ae;font-weight:600;font-size:14px;margin-top:5px}

/* Quick Play Grid */
.q-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px}
.q-btn{border:none;border-radius:10px;padding:15px 5px;color:#fff;font-weight:bold;font-size:13px;cursor:pointer;box-shadow:0 3px 6px rgba(0,0,0,0.3)}
.q-btn:active{transform:scale(0.95)}
.b-blu{background:#2196f3} .b-org{background:#ff9800} .b-yel{background:#fbc02d;color:#000} .b-grn{background:#4caf50} .b-pur{background:#9c27b0}

/* Track Player */
.t-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.sq-btn{width:45px;height:45px;border-radius:8px;background:#2196f3;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}
.sq-btn:active{background:#1976d2}
.t-name{flex:1;background:#222;height:45px;margin:0 10px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;overflow:hidden;white-space:nowrap}
.cir-row{display:flex;justify-content:space-around;align-items:center}
.cir-btn{width:55px;height:55px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;color:#fff;border:none;cursor:pointer;position:relative}
.cir-btn:active{transform:scale(0.95)}
.c-pur{background:#9c27b0} .c-org{background:#ff9800} .c-teal{background:#0097a7}
.act-mode{box-shadow:inset 0 0 10px #000; opacity:1 !important}
.inact-mode{opacity:0.4}

/* Bottom Controls */
.c-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.tile-btn{width:18.5%;padding:10px 0;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:bold;color:#fff;border:none;cursor:pointer;box-shadow:0 3px 6px rgba(0,0,0,0.3)}
.tile-btn:active{transform:scale(0.95)}
.tile-btn .icon{font-size:20px;margin-bottom:2px}
.t-red{background:#f44336} .t-blu{background:#2196f3} .t-org{background:#ff9800} .t-pur{background:#9c27b0} .t-teal{background:#00bcd4} .t-pnk{background:#e91e63}
.vol-box{width:18.5%;background:#222;height:45px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;box-shadow:inset 0 0 5px #000}
.tile-btn.act{box-shadow:inset 0 0 12px #000}

select{opacity:0;position:absolute;width:100%;height:100%;left:0;top:0;cursor:pointer}
#toast{visibility:hidden;background:#fff;color:#000;padding:10px 20px;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);border-radius:30px;z-index:99;font-weight:bold;font-size:13px}
.toast-show{visibility:visible!important;animation:fade 2s}
@keyframes fade{0%{opacity:0}20%{opacity:1}80%{opacity:1}100%{opacity:0}}

/* Settings Area */
#view-sett{display:none}
.set-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:15px}
.set-tb{background:#121212;border:1px solid #333;color:#888;padding:8px 10px;border-radius:20px;font-size:11px;font-weight:bold;flex:1;cursor:pointer}
.set-tb.act{background:#ff9800;color:#000;border-color:#ff9800}
.set-cont{display:none}
.set-cont.act{display:block}
.cd{background:#121212;padding:12px;margin-bottom:12px;border-radius:12px;text-align:left;border:1px solid #333;border-left:4px solid #ff9800}
.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-weight:bold;font-size:13px;color:#ff9800}
.rw{display:flex;justify-content:space-between;align-items:center;margin-top:6px;background:#222;padding:8px;border-radius:6px;font-size:12px;}
input[type="time"]{background:#333;color:#fff;border:1px solid #555;padding:6px;border-radius:6px;font-size:14px;outline:none}
.sw{position:relative;display:inline-block;width:36px;height:20px}
.sw input{opacity:0;width:0;height:0}
.sw span{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#555;transition:.3s;border-radius:20px}
.sw span:before{position:absolute;content:'';height:16px;width:16px;left:2px;bottom:2px;background:#ccc;transition:.3s;border-radius:50%}
input:checked+span{background:#4caf50}
input:checked+span:before{transform:translateX(16px);background:#fff}
.sync-btn{background:#4caf50;color:#fff;border:none;padding:15px;width:100%;border-radius:15px;font-weight:bold;font-size:15px;cursor:pointer;margin-top:10px}

let db, cmdRef, statusRef, setRef;
let curTrack=1, isRepeat=false, isShuffle=false, curVol=19, isConnected=false;

function initFB() {
  firebase.initializeApp(FB_CONFIG);
  db = firebase.database();
  cmdRef = db.ref("/smaran_v1/command");
  statusRef = db.ref("/smaran_v1/status");
  setRef = db.ref("/smaran_v1/settings");

  firebase.auth().signInAnonymously().then(() => {
    setConnected(true); listenStatus(); loadSettingsFromCloud(); toast("☁ Cloud Connected!");
  }).catch(() => { setConnected(false); document.getElementById('statusMsg').innerText="Auth Error"; });
}

function listenStatus() {
  statusRef.on("value", snap => {
    if (!snap.exists()) return;
    const d = snap.val();
    if(d.msg) document.getElementById("statusMsg").innerText = d.msg;
    if(d.volume !== undefined) { curVol = d.volume; document.getElementById("volNum").innerText=d.volume; }
    if(d.f4track) { curTrack=d.f4track; updateTrackDisplay(); }
    
    // Modes
    if(d.repeat !== undefined) { 
      isRepeat=d.repeat; 
      document.getElementById("btnRep").className = isRepeat ? "cir-btn c-org act-mode" : "cir-btn c-org inact-mode"; 
    }
    if(d.shuffle !== undefined) { 
      isShuffle=d.shuffle; 
      document.getElementById("btnShuf").className = isShuffle ? "cir-btn c-org act-mode" : "cir-btn c-org inact-mode"; 
    }
// Devices
    setDevState("devAmp", d.ampAct); 
    setDevState("devMini", d.maAct); 
    setDevState("devMiniSpk", d.msAct, true); 
    setDevState("devMixer", d.r4Act); 
    setDevState("devSpk", d.spkAct);

    setConnected(true);
  });
}

function cmd(action, folder, track) {
  if(!isConnected){ toast("❌ Not connected"); return; }
  const p = { action: action, timestamp: Date.now() };
  if(folder) p.folder = String(folder);
  if(track) p.track = String(track);
  cmdRef.set(p); toast("✓ Sent");
}

function nextTrack() { curTrack++; if(curTrack>TRACKS.length) curTrack=1; updateTrackDisplay(); cmd("f4_next"); }
function prevTrack() { curTrack--; if(curTrack<1) curTrack=TRACKS.length; updateTrackDisplay(); cmd("f4_prev"); }
function selectTrack(el) { let t=parseInt(el.value); if(!t)return; curTrack=t; updateTrackDisplay(); cmd("play",4,t); el.value=""; }
function updateTrackDisplay() { document.getElementById("trackName").innerText = TRACKS[curTrack-1]||"-"; }
function toggleRepeat() { isRepeat=!isRepeat; cmd("repeat_toggle"); }
function toggleShuffle() { isShuffle=!isShuffle; cmd("shuffle_toggle"); }

function setDevState(id, state, isCir=false) { 
  let el=document.getElementById(id); if(!el)return; 
  if(state) el.classList.add(isCir ? "act-mode" : "act"); 
  else el.classList.remove(isCir ? "act-mode" : "act"); 
}
function setConnected(ok) { 
  isConnected=ok; let b=document.getElementById("netBadge"); 
  if(ok){ b.className="badge"; b.innerText="ONLINE"; }
  else { b.className="badge offline"; b.innerText="OFFLINE"; } 
}
function toast(msg) { let t=document.getElementById("toast"); t.innerText=msg; t.className="toast-show"; setTimeout(()=>t.className="",2000); }

// UI View Switcher
function switchView(v) {
  document.getElementById('view-dash').style.display = v==='dash'?'block':'none';
  document.getElementById('view-sett').style.display = v==='sett'?'block':'none';
  document.getElementById('tab-dash').className = `nt-btn ${v==='dash'?'act':''}`;
  document.getElementById('tab-sett').className = `nt-btn ${v==='sett'?'act':''}`;
}

function openSetTab(id, btn) {
  document.querySelectorAll('.set-cont').forEach(e => e.classList.remove('act'));
  document.querySelectorAll('.set-tb').forEach(e => e.classList.remove('act'));
  document.getElementById(`tc-${id}`).classList.add('act');
  btn.classList.add('act');
}

// Dynamic Settings Generation
function genSettings() {
  let html = { 'g':'', 'a':'', 'ma':'', 'ms':'', 'mx':'', 'sp':'' };
  S_CONF.forEach(c => {
    let cd = `<div class='cd' style='border-left-color:${c.c}'><div class='hd'><span style='color:${c.c}'>${c.lbl}</span>`;
    cd += `<label class='sw'><input type='checkbox' id='${c.id}_en'><span></span></label></div>`;
    if(c.type === 'bell') { cd += `<div class='rw'><span>TIME</span><input type='time' id='${c.id}_s'></div>`; } 
    else { cd += `<div class='rw'><span>START</span><input type='time' id='${c.id}_s'></div><div class='rw'><span>STOP</span><input type='time' id='${c.id}_e'></div>`; }
    cd += `</div>`; html[c.t] += cd;
  });
  const cont = document.getElementById('settings-container');
  ['g','a','ma','ms','mx','sp'].forEach(t => {
    let div = document.createElement('div'); div.className = `set-cont ${t==='g'?'act':''}`; div.id = `tc-${t}`; div.innerHTML = html[t]; cont.appendChild(div);
  });
}

function loadSettingsFromCloud() {
  setRef.once("value").then(snap => {
    if(!snap.exists()) return; const d = snap.val(); const p = n => (n<10?'0':'')+n;
    S_CONF.forEach(c => {
      document.getElementById(`${c.id}_en`).checked = (d[c.v[c.v.length-1]] == 1);
      document.getElementById(`${c.id}_s`).value = `${p(d[c.v[0]]||0)}:${p(d[c.v[1]]||0)}`;
      if(c.type === 'slot') document.getElementById(`${c.id}_e`).value = `${p(d[c.v[2]]||0)}:${p(d[c.v[3]]||0)}`;
    });
  });
}

function syncSettingsToCloud() {
  if(!isConnected){ toast("❌ Off!"); return; }
  let payload = {};
  S_CONF.forEach(c => {
    payload[c.v[c.v.length-1]] = document.getElementById(`${c.id}_en`).checked ? 1 : 0;
    let tv_s = document.getElementById(`${c.id}_s`).value;
    if(tv_s) { let p = tv_s.split(':'); payload[c.v[0]] = parseInt(p[0]); payload[c.v[1]] = parseInt(p[1]); }
    if(c.type === 'slot') {
      let tv_e = document.getElementById(`${c.id}_e`).value;
      if(tv_e) { let p = tv_e.split(':'); payload[c.v[2]] = parseInt(p[0]); payload[c.v[3]] = parseInt(p[1]); }
    }
  });
  toast("⏳ Uploading...");
  setRef.set(payload).then(() => { cmd("sync_settings"); toast("✅ Syncing!"); switchView('dash'); });
}

function updateClock() {
  const d = new Date();
  let h = d.getHours(); const m = d.getMinutes(); const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; h = h ? h : 12; 
  const days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  document.getElementById('clock').innerText = `${days[d.getDay()]} ${h}:${m < 10 ? '0'+m : m} ${ampm}`;
}

window.onload = () => {
  const sel = document.getElementById("trackSel");
  TRACKS.forEach((n,i) => { let o=document.createElement("option"); o.value=i+1; o.text=(i+1)+". "+n; sel.add(o); });
  genSettings();
  setInterval(updateClock, 1000); updateClock();
  initFB();
};
</script>
</body>
</html>
